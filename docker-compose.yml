services:
  grok2api:
    container_name: grok2api
    build:
      context: .
      dockerfile: Dockerfile
    image: grok2api:local
    ports:
      - "127.0.0.1:${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-postgresql}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-redis://host.docker.internal:6379/0}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/grok2api}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://host.docker.internal:8191/}

      # ACCOUNT_STORAGE: local | redis | mysql | postgresql
      # ACCOUNT_LOCAL_PATH: SQLite path when ACCOUNT_STORAGE=local
      # ACCOUNT_REDIS_URL: Redis DSN when ACCOUNT_STORAGE=redis
      # ACCOUNT_MYSQL_URL: MySQL DSN when ACCOUNT_STORAGE=mysql
      # ACCOUNT_POSTGRESQL_URL: PostgreSQL DSN when ACCOUNT_STORAGE=postgresql
      # 外部依赖已由其他 Docker 容器发布到宿主机：
      #   PostgreSQL: http://localhost:5432/  postgres/postgres
      #   Redis:      http://localhost:6379/
      #   FlareSolverr: http://localhost:8191/
      # 容器内访问宿主机端口使用 host.docker.internal。
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # 如果出口 IP 不干净，可使用外部部署的 privoxy/warp-proxy。
  # 外部 privoxy 已发布到宿主机 127.0.0.1:40080 时，
  # 容器内代理地址配置为 http://host.docker.internal:40080。

  # FlareSolverr 已由外部 Docker 启动并发布到 http://localhost:8191/。
