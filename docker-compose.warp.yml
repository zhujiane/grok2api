services:
  # ── Init: 写入代理配置到 config.toml ──────────────────────────────────────
  init-config:
    image: python:3.13-alpine
    volumes:
      - ./data:/app/data
      - ./scripts:/scripts:ro
    command: ["python3", "/scripts/init_proxy_config.py"]
    restart: "no"

  # ── FlareSolverr: 自动解 Cloudflare 挑战 ────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info

  # ── grok2api ──────────────────────────────────────────────────────────────
  grok2api:
    image: ghcr.io/jiujiu532/grok2api:latest
    container_name: grok2api
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      init-config:
        condition: service_completed_successfully
      flaresolverr:
        condition: service_started
